# ═══════════════════════════════════════════════════════════════
# OSIRIS Forge — Bambu Lab P1S Printer Profile
# PrusaSlicer-compatible configuration
# ═══════════════════════════════════════════════════════════════
# Build Volume: 256 × 256 × 256 mm
# Protocol:     MQTT (port 8883) + FTPS (port 990)
# Firmware:     Bambu Lab proprietary
# AMS Support:  Yes (4-spool Automatic Material System)
# ═══════════════════════════════════════════════════════════════

# ── Printer ──────────────────────────────────────────────────
[printer]
printer_model = bambu_p1s
printer_vendor = Bambu Lab
bed_shape = 0x0,256x0,256x256,0x256
max_print_height = 256
nozzle_diameter = 0.4
default_filament_profile = PLA
default_print_profile = 0.20mm Standard

# ── Print — 0.20mm Standard ────────────────────────────────
[print:0.20mm Standard]
layer_height = 0.20
first_layer_height = 0.20
perimeters = 2
top_solid_layers = 5
bottom_solid_layers = 4
fill_density = 20%
fill_pattern = gyroid
infill_every_layers = 1
perimeter_speed = 200
infill_speed = 250
travel_speed = 500
first_layer_speed = 50
external_perimeter_speed = 150
support_material = 1
support_material_auto = 1
support_material_threshold = 55
support_material_pattern = rectilinear
support_material_spacing = 2.5
support_material_contact_distance = 0.2
brim_width = 0
skirts = 1
skirt_distance = 2
skirt_height = 1
seam_position = aligned
ironing = 0
avoid_crossing_perimeters = 0

# ── Print — 0.12mm Fine ────────────────────────────────────
[print:0.12mm Fine]
layer_height = 0.12
first_layer_height = 0.20
perimeters = 3
top_solid_layers = 7
bottom_solid_layers = 5
fill_density = 20%
fill_pattern = gyroid
perimeter_speed = 150
infill_speed = 200
travel_speed = 500
first_layer_speed = 40
support_material = 1
support_material_auto = 1

# ── Print — 0.28mm Draft ───────────────────────────────────
[print:0.28mm Draft]
layer_height = 0.28
first_layer_height = 0.28
perimeters = 2
top_solid_layers = 4
bottom_solid_layers = 3
fill_density = 15%
fill_pattern = grid
perimeter_speed = 300
infill_speed = 350
travel_speed = 500
first_layer_speed = 60

# ── Print — Structural (for tetrahedral lattice) ──────────
[print:Structural Lattice]
layer_height = 0.16
first_layer_height = 0.20
perimeters = 4
top_solid_layers = 6
bottom_solid_layers = 6
fill_density = 40%
fill_pattern = gyroid
perimeter_speed = 120
infill_speed = 150
first_layer_speed = 30
support_material = 1
support_material_auto = 1
support_material_threshold = 45
brim_width = 5

# ── Print — Acoustic Resonance Cavity ─────────────────────
[print:Acoustic Cavity]
layer_height = 0.12
first_layer_height = 0.16
perimeters = 5
top_solid_layers = 8
bottom_solid_layers = 8
fill_density = 0%
fill_pattern = gyroid
perimeter_speed = 80
infill_speed = 100
first_layer_speed = 25
support_material = 1
support_material_auto = 1
support_material_threshold = 40
ironing = 1
ironing_type = top
ironing_speed = 40

# ── Filament — PLA ─────────────────────────────────────────
[filament:PLA]
filament_type = PLA
filament_diameter = 1.75
filament_density = 1.24
filament_cost = 25
temperature = 220
first_layer_temperature = 220
bed_temperature = 55
first_layer_bed_temperature = 60
fan_always_on = 1
min_fan_speed = 80
max_fan_speed = 100
bridge_fan_speed = 100
cooling = 1
min_print_speed = 10

# ── Filament — PETG ────────────────────────────────────────
[filament:PETG]
filament_type = PETG
filament_diameter = 1.75
filament_density = 1.27
filament_cost = 30
temperature = 240
first_layer_temperature = 245
bed_temperature = 80
first_layer_bed_temperature = 85
fan_always_on = 1
min_fan_speed = 30
max_fan_speed = 50
bridge_fan_speed = 80
cooling = 1
min_print_speed = 10

# ── Filament — ABS ─────────────────────────────────────────
[filament:ABS]
filament_type = ABS
filament_diameter = 1.75
filament_density = 1.04
filament_cost = 28
temperature = 255
first_layer_temperature = 260
bed_temperature = 100
first_layer_bed_temperature = 105
fan_always_on = 0
min_fan_speed = 0
max_fan_speed = 30
bridge_fan_speed = 50
cooling = 0
min_print_speed = 10

# ── Filament — TPU ─────────────────────────────────────────
[filament:TPU]
filament_type = TPU
filament_diameter = 1.75
filament_density = 1.21
filament_cost = 35
temperature = 230
first_layer_temperature = 230
bed_temperature = 50
first_layer_bed_temperature = 55
fan_always_on = 1
min_fan_speed = 50
max_fan_speed = 80
cooling = 1
min_print_speed = 5
max_speed = 40
