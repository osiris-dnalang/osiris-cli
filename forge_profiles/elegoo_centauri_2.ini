# ═══════════════════════════════════════════════════════════════
# OSIRIS Forge — Elegoo Centauri Carbon 2 Printer Profile
# Resin MSLA Configuration
# ═══════════════════════════════════════════════════════════════
# Build Volume: 218 × 123 × 210 mm
# Resolution:   11520 × 5120 px (14K)
# XY Pixel:     18.93 µm
# Light Source:  COB + Fresnel lens
# Protocol:     USB flash drive / WiFi (firmware dependent)
# Firmware:     Elegoo / ChiTuBox compatible
# ═══════════════════════════════════════════════════════════════

# ── Printer ──────────────────────────────────────────────────
[printer]
printer_model = elegoo_centauri_carbon_2
printer_vendor = Elegoo
bed_shape = 0x0,218x0,218x123,0x123
max_print_height = 210
printer_type = msla_resin
pixel_size_um = 18.93
resolution_x = 11520
resolution_y = 5120
light_source = cob_fresnel

# ── Resin — Standard Grey ──────────────────────────────────
[resin:Standard Grey]
resin_type = standard
resin_vendor = Elegoo
resin_color = grey
exposure_time = 2.0
bottom_exposure = 25.0
bottom_layers = 6
transition_layers = 8
off_time = 1.0
bottom_lift_distance = 6.0
bottom_lift_speed = 60
lift_distance = 5.0
lift_speed = 80
retract_speed = 150
layer_height = 0.05

# ── Resin — ABS-Like Grey ──────────────────────────────────
[resin:ABS-Like Grey]
resin_type = abs_like
resin_vendor = Elegoo
resin_color = grey
exposure_time = 2.5
bottom_exposure = 30.0
bottom_layers = 6
transition_layers = 8
off_time = 1.0
bottom_lift_distance = 6.0
bottom_lift_speed = 60
lift_distance = 5.0
lift_speed = 80
retract_speed = 150
layer_height = 0.05

# ── Resin — Water Washable Grey ────────────────────────────
[resin:Water Washable Grey]
resin_type = water_washable
resin_vendor = Elegoo
resin_color = grey
exposure_time = 2.5
bottom_exposure = 35.0
bottom_layers = 8
transition_layers = 10
off_time = 1.5
bottom_lift_distance = 6.0
bottom_lift_speed = 50
lift_distance = 5.0
lift_speed = 70
retract_speed = 150
layer_height = 0.05

# ── Resin — Plant-Based Translucent ────────────────────────
[resin:Plant-Based Clear]
resin_type = plant_based
resin_vendor = Elegoo
resin_color = translucent
exposure_time = 3.0
bottom_exposure = 40.0
bottom_layers = 8
transition_layers = 10
off_time = 2.0
bottom_lift_distance = 7.0
bottom_lift_speed = 50
lift_distance = 6.0
lift_speed = 65
retract_speed = 130
layer_height = 0.05

# ── Print — 0.05mm Standard (Default) ─────────────────────
[print:0.05mm Standard]
layer_height = 0.05
anti_alias = 8
image_blur = 2
tolerance_compensation = 0.0
bottom_light_pwm = 255
light_pwm = 255

# ── Print — 0.025mm Ultra Fine ─────────────────────────────
[print:0.025mm Ultra Fine]
layer_height = 0.025
anti_alias = 16
image_blur = 1
tolerance_compensation = -0.02
bottom_light_pwm = 255
light_pwm = 255

# ── Print — 0.10mm Fast ────────────────────────────────────
[print:0.10mm Fast]
layer_height = 0.10
anti_alias = 4
image_blur = 4
tolerance_compensation = 0.05
bottom_light_pwm = 255
light_pwm = 255

# ── OSIRIS Geometry — Tetrahedral Lattice (Resin) ──────────
[print:Tetrahedral Lattice Resin]
layer_height = 0.03
anti_alias = 16
image_blur = 1
tolerance_compensation = -0.02
; Fine detail for lattice struts — thin features need
; higher AA and lower blur for crisp edges
; Use ABS-Like resin for structural strength

# ── OSIRIS Geometry — Toroidal Manifold (Resin) ────────────
[print:Toroidal Manifold Resin]
layer_height = 0.05
anti_alias = 8
image_blur = 2
tolerance_compensation = 0.0
; Standard resolution sufficient for smooth toroidal surface
; R/r=phi ratio visible at 10cm scale

# ── OSIRIS Geometry — Quaternion Orbit (Resin) ─────────────
[print:Quaternion Orbit Resin]
layer_height = 0.025
anti_alias = 16
image_blur = 1
tolerance_compensation = -0.03
; Ultra-fine for quaternion orbit paths
; 24-element binary tetrahedral group visualization
; Use clear/translucent resin for best effect
