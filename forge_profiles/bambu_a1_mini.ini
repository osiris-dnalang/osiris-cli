# ═══════════════════════════════════════════════════════════════
# OSIRIS Forge — Bambu Lab A1 Mini Printer Profile
# PrusaSlicer-compatible configuration
# ═══════════════════════════════════════════════════════════════
# Build Volume: 180 × 180 × 180 mm
# Protocol:     MQTT (port 8883) + FTPS (port 990)
# Firmware:     Bambu Lab proprietary
# AMS Support:  Yes (AMS Lite 4-spool)
# Note:         Compact format, lower bed temp max (80°C)
# ═══════════════════════════════════════════════════════════════

# ── Printer ──────────────────────────────────────────────────
[printer]
printer_model = bambu_a1_mini
printer_vendor = Bambu Lab
bed_shape = 0x0,180x0,180x180,0x180
max_print_height = 180
nozzle_diameter = 0.4
default_filament_profile = PLA
default_print_profile = 0.20mm Standard

# ── Print — 0.20mm Standard ────────────────────────────────
[print:0.20mm Standard]
layer_height = 0.20
first_layer_height = 0.20
perimeters = 2
top_solid_layers = 5
bottom_solid_layers = 4
fill_density = 20%
fill_pattern = gyroid
infill_every_layers = 1
perimeter_speed = 200
infill_speed = 250
travel_speed = 500
first_layer_speed = 50
external_perimeter_speed = 150
support_material = 1
support_material_auto = 1
support_material_threshold = 55
brim_width = 0
skirts = 1
skirt_distance = 2
seam_position = aligned

# ── Print — 0.12mm Fine ────────────────────────────────────
[print:0.12mm Fine]
layer_height = 0.12
first_layer_height = 0.20
perimeters = 3
top_solid_layers = 7
bottom_solid_layers = 5
fill_density = 20%
fill_pattern = gyroid
perimeter_speed = 150
infill_speed = 200
travel_speed = 500
first_layer_speed = 40

# ── Print — Structural Lattice ─────────────────────────────
[print:Structural Lattice]
layer_height = 0.16
first_layer_height = 0.20
perimeters = 4
top_solid_layers = 6
bottom_solid_layers = 6
fill_density = 40%
fill_pattern = gyroid
perimeter_speed = 120
infill_speed = 150
first_layer_speed = 30
support_material = 1
support_material_auto = 1
support_material_threshold = 45
brim_width = 5

# ── Print — Torsion Lock Visualizer ────────────────────────
[print:Torsion Lock]
layer_height = 0.12
first_layer_height = 0.16
perimeters = 3
top_solid_layers = 6
bottom_solid_layers = 5
fill_density = 25%
fill_pattern = gyroid
perimeter_speed = 100
infill_speed = 120
first_layer_speed = 25
support_material = 1
brim_width = 3

# ── Filament — PLA ─────────────────────────────────────────
[filament:PLA]
filament_type = PLA
filament_diameter = 1.75
filament_density = 1.24
filament_cost = 25
temperature = 220
first_layer_temperature = 220
bed_temperature = 55
first_layer_bed_temperature = 60
fan_always_on = 1
min_fan_speed = 80
max_fan_speed = 100
bridge_fan_speed = 100
cooling = 1

# ── Filament — PETG ────────────────────────────────────────
[filament:PETG]
filament_type = PETG
filament_diameter = 1.75
filament_density = 1.27
filament_cost = 30
temperature = 240
first_layer_temperature = 245
bed_temperature = 75
first_layer_bed_temperature = 80
fan_always_on = 1
min_fan_speed = 30
max_fan_speed = 50
bridge_fan_speed = 80
cooling = 1

# ── Filament — PLA Silk ────────────────────────────────────
[filament:PLA Silk]
filament_type = PLA
filament_diameter = 1.75
filament_density = 1.24
filament_cost = 30
temperature = 215
first_layer_temperature = 220
bed_temperature = 55
first_layer_bed_temperature = 60
fan_always_on = 1
min_fan_speed = 60
max_fan_speed = 80
cooling = 1
