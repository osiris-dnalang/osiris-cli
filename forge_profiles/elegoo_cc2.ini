# ═══════════════════════════════════════════════════════════════
# OSIRIS Forge — Elegoo Centauri Carbon 2 Printer Profile
# FDM CoreXY + CANVAS 4-Color Multi-Material System
# ═══════════════════════════════════════════════════════════════
# Build Volume:  320 × 320 × 350 mm
# Motion System: CoreXY (700 mm/s max, 20000 mm/s² accel)
# Nozzle:        Hardened steel, 350°C max
# Firmware:      Klipper-based (Cosmos)
# Network:       Moonraker API port 7125
# Multi-Color:   CANVAS 4-extruder unit
# Enclosure:     Fully enclosed + smart grille ventilation
# Camera:        AI intelligent detection
# ═══════════════════════════════════════════════════════════════

# ── Printer ──────────────────────────────────────────────────
[printer]
printer_model = elegoo_centauri_carbon_2
printer_vendor = Elegoo
bed_shape = 0x0,320x0,320x320,0x320
max_print_height = 350
printer_type = fdm_corexy
nozzle_diameter = 0.4
max_nozzle_temp = 350
max_bed_temp = 120
firmware = klipper
api_protocol = moonraker
api_port = 7125
canvas_extruders = 4
enclosed_chamber = true
ai_camera = true

# ── Print — Standard (0.20mm) ───────────────────────────────
[print:0.20mm Standard]
layer_height = 0.20
first_layer_height = 0.28
perimeters = 3
top_solid_layers = 5
bottom_solid_layers = 4
fill_density = 20%
fill_pattern = gyroid
support_material = 1
support_material_auto = 1
max_print_speed = 300
travel_speed = 500
first_layer_speed = 50
infill_speed = 250
perimeter_speed = 200
retract_length = 0.8
retract_speed = 60

# ── Print — Fine Detail (0.10mm) ────────────────────────────
[print:0.10mm Fine]
layer_height = 0.10
first_layer_height = 0.20
perimeters = 4
top_solid_layers = 7
bottom_solid_layers = 5
fill_density = 25%
fill_pattern = gyroid
support_material = 1
support_material_auto = 1
max_print_speed = 200
travel_speed = 500
first_layer_speed = 30
infill_speed = 150
perimeter_speed = 100
retract_length = 0.8
retract_speed = 60

# ── Print — Quantum Sculpture (0.16mm, high structural integrity) ──
[print:0.16mm Quantum Sculpture]
layer_height = 0.16
first_layer_height = 0.24
perimeters = 4
top_solid_layers = 6
bottom_solid_layers = 5
fill_density = 30%
fill_pattern = gyroid
support_material = 1
support_material_auto = 1
max_print_speed = 250
travel_speed = 500
first_layer_speed = 40
infill_speed = 200
perimeter_speed = 150
retract_length = 0.8
retract_speed = 60

# ── Filament — PA-CF (T0: Structural Grey) ──────────────────
[filament:PA-CF Grey]
filament_type = PA-CF
filament_vendor = Generic
filament_colour = #808080
filament_diameter = 1.75
filament_density = 1.15
temperature = 300
first_layer_temperature = 300
bed_temperature = 100
first_layer_bed_temperature = 100
chamber_temperature = 45
fan_always_on = 0
min_fan_speed = 0
max_fan_speed = 30
bridge_fan_speed = 50
filament_retract_length = 0.8

# ── Filament — PETG (T1: Bifurcation Red) ───────────────────
[filament:PETG Red]
filament_type = PETG
filament_vendor = Generic
filament_colour = #FF0000
filament_diameter = 1.75
filament_density = 1.27
temperature = 240
first_layer_temperature = 245
bed_temperature = 75
first_layer_bed_temperature = 80
fan_always_on = 1
min_fan_speed = 30
max_fan_speed = 60
bridge_fan_speed = 100
filament_retract_length = 0.8

# ── Filament — PLA (T2: Entropy Suppression Blue) ───────────
[filament:PLA Blue]
filament_type = PLA
filament_vendor = Generic
filament_colour = #0000FF
filament_diameter = 1.75
filament_density = 1.24
temperature = 210
first_layer_temperature = 215
bed_temperature = 60
first_layer_bed_temperature = 65
fan_always_on = 1
min_fan_speed = 50
max_fan_speed = 100
bridge_fan_speed = 100
filament_retract_length = 0.8

# ── Filament — PLA-CF (T3: Torsion Lock Black) ──────────────
[filament:PLA-CF Black]
filament_type = PLA-CF
filament_vendor = Generic
filament_colour = #1A1A1A
filament_diameter = 1.75
filament_density = 1.20
temperature = 220
first_layer_temperature = 225
bed_temperature = 60
first_layer_bed_temperature = 65
fan_always_on = 1
min_fan_speed = 40
max_fan_speed = 80
bridge_fan_speed = 100
filament_retract_length = 0.8

# ── CANVAS Multi-Color Configuration ────────────────────────
[canvas]
extruder_count = 4
purge_volume = 140
purge_in_infill = true
wipe_tower = true
wipe_tower_x = 300
wipe_tower_y = 160
wipe_tower_width = 15
tool_change_retract = 2.0
tool_change_retract_speed = 60
cooling_tube_length = 20
cooling_tube_retraction = 35
parking_pos_retraction = 65

# CANVAS extruder → Shannon entropy mapping
t0_role = structural
t0_material = PA-CF
t0_color = grey
t1_role = bifurcation
t1_material = PETG
t1_color = red
t2_role = entropy_suppression
t2_material = PLA
t2_color = blue
t3_role = torsion_lock
t3_material = PLA-CF
t3_color = black
